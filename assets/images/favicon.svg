<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <linearGradient id="pinkGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E7B"/>
      <stop offset="100%" stop-color="#E5A620"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" stroke="#E91E7B" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="256" cy="256" r="150" stroke="#E5A620" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Central circle -->
  <circle cx="256" cy="256" r="80" fill="#E91E7B"/>
  <circle cx="256" cy="256" r="65" fill="#16161F"/>

  <!-- Bluetooth symbol -->
  <g transform="translate(236, 228)">
    <path d="M20 5 L40 25 L20 45 M40 25 L20 5 M40 25 L20 45" 
          stroke="url(#pinkGold)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connection dots -->
  <circle cx="256" cy="60" r="12" fill="#E5A620"/>
  <circle cx="420" cy="160" r="12" fill="#E91E7B"/>
  <circle cx="420" cy="352" r="12" fill="#E5A620"/>
  <circle cx="256" cy="452" r="12" fill="#E91E7B"/>
  <circle cx="92" cy="352" r="12" fill="#E5A620"/>
  <circle cx="92" cy="160" r="12" fill="#E91E7B"/>

  <!-- Connection lines -->
  <line x1="256" y1="180" x2="256" y2="72" stroke="#E91E7B" stroke-width="1.5" opacity="0.5"/>
  <line x1="320" y1="210" x2="408" y2="165" stroke="#E5A620" stroke-width="1.5" opacity="0.5"/>
  <line x1="320" y1="302" x2="408" y2="347" stroke="#E91E7B" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="332" x2="256" y2="440" stroke="#E5A620" stroke-width="1.5" opacity="0.5"/>
  <line x1="192" y1="302" x2="104" y2="347" stroke="#E91E7B" stroke-width="1.5" opacity="0.5"/>
  <line x1="192" y1="210" x2="104" y2="165" stroke="#E5A620" stroke-width="1.5" opacity="0.5"/>
</svg>